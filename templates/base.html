<!doctype html>
<html lang="da">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SecureHRM Demo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem auto; max-width: 960px; line-height: 1.5; }
        nav a { margin-right: 1rem; }
        code, pre { background: #f4f4f4; padding: 0.2rem 0.4rem; }
        pre { padding: 1rem; overflow-x: auto; }
        table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
        th, td { border: 1px solid #ccc; padding: 0.5rem; text-align: left; }
        .flash { background: #eef7ee; border: 1px solid #9dc79d; padding: 0.75rem; margin: 1rem 0; }
        .card { border: 1px solid #ddd; padding: 1rem; margin: 1rem 0; }
        .danger { color: #8b0000; }
        input, textarea { width: 100%; padding: 0.5rem; margin: 0.25rem 0 0.75rem; }
        button { padding: 0.6rem 1rem; }
    </style>
</head>
<body>
    <h1>SecureHRM Demo</h1>
    <nav>
        <a href="{{ url_for('index') }}">Forside</a>
        <a href="{{ url_for('reports') }}">Reports</a>
        <a href="{{ url_for('feedback') }}">Feedback</a>
        <a href="{{ url_for('upload') }}">Upload</a>
        <a href="{{ url_for('backup') }}">Backup</a>
        <a href="{{ url_for('download') }}">Download</a>
        <a href="{{ url_for('reset_demo') }}">Nulstil data</a>
    </nav>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="flash">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</body>
</html>
